<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Book - Book Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 p-4 md:p-8">

  <!-- Navbar -->
  <nav class="bg-white shadow-md mb-8">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-blue-600">📚 Book Explorer</h1>
      <ul class="hidden md:flex space-x-6 font-medium">
        <li><a href="index.html" class="hover:text-blue-500">Home</a></li>
        <li><a href="favorite.html" class="hover:text-blue-500">Favorites</a></li>
        <li><a href="about.html" class="hover:text-blue-500">About</a></li>
      </ul>
    </div>
  </nav>

  <h2 class="text-3xl font-bold mb-6 text-center">Book Order Form</h2>

  <div class="max-w-lg mx-auto bg-white shadow rounded p-6">
    <form id="orderForm" class="space-y-4">

      <!-- Book Name -->
      <div>
        <label class="block font-medium">Book Name:</label>
        <input type="text" id="bookName" readonly placeholder="Name of book you are looking for"
               class="w-full border-gray-300 rounded p-2 bg-gray-100">
      </div>

      <!-- Author -->
      <div>
        <label class="block font-medium">Author:</label>
        <input type="text" id="authorName" readonly placeholder="Author of the book"
               class="w-full border-gray-300 rounded p-2 bg-gray-100">
      </div>

      <!-- User Name -->
      <div>
        <label class="block font-medium">Your Name:</label>
        <input type="text" required placeholder="write your names" 
               class="w-full border-gray-300 rounded p-2">
      </div>

      <!-- Email -->
      <div>
        <label class="block font-medium">Email:</label>
        <input type="email" required placeholder="write your email"
               class="w-full border-gray-300 rounded p-2">
      </div>

      <!-- Phone -->
      <div>
        <label class="block font-medium">Phone Number:</label>
        <input type="tel" required placeholder="write your phone number"
               class="w-full border-gray-300 rounded p-2">
      </div>

      <!-- Address -->
      <div>
        <label class="block font-medium">Address:</label>
        <textarea required placeholder="write your location" class="w-full border-gray-300 rounded p-2"></textarea>
      </div>

      <!-- Submit Button -->
      <button type="submit" 
              class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-500 transition">
        Submit Order
      </button>
    </form>
  </div>

</body>
</html>
